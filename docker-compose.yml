services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    environment:
      POSTGRES_DB: eventforge
      POSTGRES_USER: eventforge
      POSTGRES_PASSWORD: eventforge
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/control-plane/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventforge -d eventforge"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventforge
      MINIO_ROOT_PASSWORD: eventforge-secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
  control-plane:
    profiles: ["app", "cloudflare-tunnel"]
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://eventforge:eventforge@postgres:5432/eventforge
      S3_ENDPOINT: http://minio:9000
      EVENTFORGE_RUNTIME_MODE: remote
      EVENTFORGE_HOST: 0.0.0.0
      EVENTFORGE_CODEX_WORKDIR: /workspaces
      EVENTFORGE_ENCRYPTION_KEY: ${EVENTFORGE_ENCRYPTION_KEY:-}
      EVENTFORGE_ALLOWED_ORIGINS: ${EVENTFORGE_ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:4310:4310"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  cloudflared:
    profiles: ["cloudflare-tunnel"]
    image: cloudflare/cloudflared:2026.7.2@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
    command: ["tunnel", "--no-autoupdate", "--loglevel", "info", "--metrics", "0.0.0.0:2000", "run"]
    environment:
      # The tunnel profile is opt-in. An empty token keeps `docker compose config`
      # usable for the default local stack; cloudflared itself fails closed when
      # the profile is enabled without a real token.
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      control-plane:
        condition: service_started
    restart: unless-stopped
volumes:
  postgres-data:
  minio-data:
