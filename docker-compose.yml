services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: eventforge
      POSTGRES_USER: eventforge
      POSTGRES_PASSWORD: eventforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/control-plane/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventforge -d eventforge"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventforge
      MINIO_ROOT_PASSWORD: eventforge-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  control-plane:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://eventforge:eventforge@postgres:5432/eventforge
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "4310:4310"
  cloudflared:
    profiles: ["cloudflare-tunnel"]
    image: cloudflare/cloudflared:2026.7.2
    command: ["tunnel", "--no-autoupdate", "--loglevel", "info", "--metrics", "0.0.0.0:2000", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in the ignored .env file or your secret store.}
    depends_on:
      control-plane:
        condition: service_started
    restart: unless-stopped
volumes:
  postgres-data:
  minio-data:
