# Extend the default gitleaks ruleset, but exclude generated, minified plugin
# bundles (esbuild output committed for the plugin:check gate). Minifier tokens
# false-positive on generic-api-key; these files are build artifacts, not source.
[extend]
useDefault = true

[allowlist]
description = "Generated minified plugin bundles (not source)"
paths = [
  plugins/eventforge/server/eventforge-standalone.cjs,
  plugins/eventforge/server/eventforge-mcp-http.cjs,
  plugins/eventforge/server/eventforge-mcp.mjs,
]
