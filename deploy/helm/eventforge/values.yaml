image:
  repository: ghcr.io/eventforge/control-plane
  tag: latest
  pullPolicy: IfNotPresent
# The current store is process-local. Keep a single replica until workflow, run, and memory state are shared.
replicaCount: 1
service:
  type: ClusterIP
  port: 4310
ingress:
  enabled: false
  className: ""
  host: eventforge.example.com
postgres:
  existingSecret: eventforge-postgres
  databaseUrlKey: database-url
secrets:
  existingSecret: eventforge-runtime
  openaiApiKeyKey: openai-api-key
  masterKeyKey: master-key
providerSecrets:
  github:
    webhookEnabled: false
    webhookSecretKey: github-webhook-secret
    appCredentialsEnabled: false
    appIdKey: github-app-id
    appPrivateKeyKey: github-app-private-key
  linear:
    webhookEnabled: false
    webhookSecretKey: linear-webhook-secret
    oauthEnabled: false
    clientIdKey: linear-client-id
    clientSecretKey: linear-client-secret
  sentry:
    webhookEnabled: false
    webhookSecretKey: sentry-webhook-secret
    authTokenEnabled: false
    authTokenKey: sentry-auth-token
env:
  EVENTFORGE_RUNNER: codex
  EVENTFORGE_DEMO_MODE: "false"
  EVENTFORGE_ALLOWED_ORIGINS: "https://eventforge.dev"
cloudflareTunnel:
  enabled: false
  replicaCount: 2
  image:
    repository: cloudflare/cloudflared
    tag: "2026.7.2"
    pullPolicy: IfNotPresent
  existingSecret: eventforge-cloudflared
  tokenKey: tunnel-token
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }
resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { cpu: "1", memory: 1Gi }
